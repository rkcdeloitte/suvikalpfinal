<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <!-- Bar chart icon (3 bars, staggered heights, golden/olive colour) -->
  <g transform="translate(18, 18)">
    <!-- Left bar (shortest) -->
    <rect x="0"  y="24" width="16" height="46" rx="2" fill="#8B7530"/>
    <!-- Middle bar (tallest) -->
    <rect x="20" y="6"  width="16" height="64" rx="2" fill="#8B7530"/>
    <!-- Right bar (medium) -->
    <rect x="40" y="14" width="16" height="56" rx="2" fill="#8B7530"/>
  </g>

  <!-- "True" in black, "RE" in dark green, bold serif-style -->
  <text x="92" y="62" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="46" fill="#1a1a1a" letter-spacing="-0.5">True</text>
  <text x="218" y="62" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="46" fill="#2d6b2d" letter-spacing="-0.5">RE</text>

  <!-- Gold horizontal rule -->
  <rect x="92" y="70" width="210" height="4" rx="2" fill="#C9A227"/>

  <!-- "ORIANA POWER LIMITED" in small caps -->
  <text x="92" y="96" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="17" fill="#1a1a1a" letter-spacing="1.5">ORIANA POWER LIMITED</text>
</svg>
